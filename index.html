<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>着せ替えプロンプト作成ツール</title>

<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont;
  background: #f5f4f0;
  padding: 1rem;
}
h1 { font-size: 18px; margin-bottom: 1rem; }

.section {
  background: #fff;
  border-radius: 12px;
  padding: 1rem;
  margin-bottom: 10px;
}

.chips { display: flex; flex-wrap: wrap; gap: 6px; }
.chip {
  padding: 6px 10px;
  border-radius: 20px;
  border: 1px solid #ccc;
  cursor: pointer;
}
.chip.selected {
  background: #000;
  color: #fff;
}

textarea, input {
  width: 100%;
  padding: 10px;
  border-radius: 10px;
  border: 1px solid #ccc;
}

button {
  width: 100%;
  padding: 12px;
  border-radius: 12px;
  border: none;
  margin-top: 10px;
  font-size: 14px;
}

.primary { background: #000; color: #fff; }
.success { background: #2a7a2a; color: #fff; }

#preview {
  width: 100%;
  margin-top: 10px;
  border-radius: 10px;
  display: none;
}

.toast {
  position: fixed;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%);
  background: black;
  color: white;
  padding: 10px 16px;
  border-radius: 20px;
  display: none;
}
</style>
</head>

<body>

<h1>👗 着せ替えプロンプト</h1>

<div class="section">
  <input type="file" id="file">
  <img id="preview">
</div>

<div class="section">
  <div>変える部分</div>
  <div class="chips">
    <div class="chip" data="outfit">服</div>
    <div class="chip" data="hair">髪</div>
    <div class="chip" data="makeup">メイク</div>
    <div class="chip" data="all">全部</div>
  </div>
</div>

<div class="section">
  <div>スタイル</div>
  <div class="chips">
    <div class="chip" data-style="elegant fashion">綺麗め</div>
    <div class="chip" data-style="casual outfit">カジュアル</div>
    <div class="chip" data-style="korean fashion">韓国</div>
  </div>
</div>

<div class="section">
  <div>雰囲気</div>
  <div class="chips">
    <div class="chip" data-mood="soft feminine">やわらかい</div>
    <div class="chip" data-mood="cool stylish">かっこいい</div>
    <div class="chip" data-mood="cute charming">かわいい</div>
  </div>
</div>

<div class="section">
  <div>色・服指定</div>
  <input id="color">
</div>

<div class="section">
  <div>追加要望</div>
  <textarea id="custom"></textarea>
</div>

<div class="section">
  <label>
    <input type="checkbox" id="faceLock" checked>
    顔固定モード（おすすめ）
  </label>
</div>

<button class="primary" onclick="generate()">生成してコピー</button>

<div class="section">
  <div id="result"></div>
</div>

<button class="success" onclick="openSeaArt()">SeaArtで開く</button>

<div class="toast" id="toast"></div>

<script>
let state = {
  targets: [],
  style: '',
  mood: ''
};

document.getElementById('file').onchange = e => {
  let f = e.target.files[0];
  let r = new FileReader();
  r.onload = ev => {
    let img = document.getElementById('preview');
    img.src = ev.target.result;
    img.style.display = 'block';
  };
  r.readAsDataURL(f);
};

document.querySelectorAll('[data]').forEach(el=>{
  el.onclick=()=>{
    el.classList.toggle('selected');
  }
});

document.querySelectorAll('[data-style]').forEach(el=>{
  el.onclick=()=>{
    document.querySelectorAll('[data-style]').forEach(c=>c.classList.remove('selected'));
    el.classList.add('selected');
    state.style = el.getAttribute('data-style');
  }
});

document.querySelectorAll('[data-mood]').forEach(el=>{
  el.onclick=()=>{
    document.querySelectorAll('[data-mood]').forEach(c=>c.classList.remove('selected'));
    el.classList.add('selected');
    state.mood = el.getAttribute('data-mood');
  }
});

function generate(){

  let targets = [];
  document.querySelectorAll('[data].selected').forEach(el=>{
    targets.push(el.getAttribute('data'));
  });

  let color = document.getElementById('color').value;
  let custom = document.getElementById('custom').value;
  let faceLock = document.getElementById('faceLock').checked;

  let prompt = `
best quality, ultra realistic photo, high detail, photorealistic,
${faceLock ? "same person, preserve identity, keep original face, no face change," : ""}

${targets.join(', ')},
${state.style},
${state.mood},
${color},
${custom},

natural lighting, realistic skin, sharp focus
  `;

  let negative = `
low quality, blurry, bad anatomy, deformed face,
different person, identity loss,
extra fingers, extra limbs, distorted body
  `;

  let final = prompt + "\n\nNegative:\n" + negative;

  document.getElementById('result').innerText = final;

  navigator.clipboard.writeText(final);
  show("コピーした！");
}

function openSeaArt(){
  window.open("https://www.seaart.ai/tools/img2img");
}

function show(t){
  let el = document.getElementById('toast');
  el.innerText = t;
  el.style.display='block';
  setTimeout(()=>el.style.display='none',2000);
}
</script>

</body>
</html>
