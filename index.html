<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>はるか着せ替えツール</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Sans', sans-serif; background: #f5f4f0; color: #1a1a1a; padding: 1rem; }
  h1 { font-size: 18px; font-weight: 600; margin-bottom: 1.25rem; }
  .section { background: #fff; border-radius: 14px; padding: 1rem; margin-bottom: 0.75rem; border: 0.5px solid #e0ddd6; }
  .section-label { font-size: 11px; color: #888; font-weight: 600; letter-spacing: 0.06em; margin-bottom: 10px; }
  .upload-area { border: 1.5px dashed #d0cdc6; border-radius: 12px; padding: 1.5rem; text-align: center; cursor: pointer; background: #f9f8f5; }
  .upload-area.has-image { border-style: solid; border-color: #1a1a1a; }
  .upload-area p { font-size: 13px; color: #888; margin-top: 6px; }
  #preview { width: 100%; border-radius: 10px; display: none; margin-top: 0.75rem; max-height: 220px; object-fit: cover; }
  .chips { display: flex; flex-wrap: wrap; gap: 6px; }
  .chip { font-size: 13px; padding: 6px 12px; border-radius: 20px; border: 0.5px solid #d0cdc6; background: #f5f4f0; color: #1a1a1a; cursor: pointer; }
  .chip.selected { background: #1a1a1a; color: #fff; border-color: #1a1a1a; }
  .prompt-box { background: #fff; border-radius: 14px; padding: 1rem; margin-bottom: 0.75rem; border: 0.5px solid #e0ddd6; }
  .prompt-label { font-size: 11px; color: #888; font-weight: 600; letter-spacing: 0.06em; margin-bottom: 8px; }
  .prompt-text { font-size: 12px; font-family: monospace; color: #333; line-height: 1.6; word-break: break-all; min-height: 48px; }
  .prompt-text.placeholder { color: #aaa; font-family: inherit; font-size: 13px; }
  .neg-label { font-size: 10px; color: #bbb; letter-spacing: 0.05em; margin: 10px 0 4px; }
  .negative-text { font-size: 12px; font-family: monospace; color: #999; line-height: 1.5; word-break: break-all; padding-top: 8px; border-top: 0.5px solid #e0ddd6; }
  .btn-row { display: flex; gap: 8px; margin-bottom: 0.75rem; }
  .btn { flex: 1; padding: 12px; border-radius: 12px; border: 0.5px solid #d0cdc6; background: #fff; color: #1a1a1a; font-size: 14px; cursor: pointer; font-family: inherit; }
  .btn.primary { background: #1a1a1a; color: #fff; border-color: #1a1a1a; }
  .btn.success { background: #2a7a2a; color: #fff; border-color: #2a7a2a; }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .analysis-box { background: #f0f7ff; border-radius: 12px; padding: 0.875rem; margin-bottom: 0.75rem; border: 0.5px solid #bdd4f0; display: none; }
  .analysis-label { font-size: 10px; color: #7aaad8; font-weight: 600; letter-spacing: 0.05em; margin-bottom: 6px; }
  .analysis-box p { font-size: 12px; color: #2a5fa0; line-height: 1.7; }
  .guide-box { background: #fff9e6; border-radius: 12px; padding: 0.875rem; margin-bottom: 0.75rem; border: 0.5px solid #f0d060; display: none; }
  .guide-box p { font-size: 13px; color: #7a6000; line-height: 1.8; }
  .guide-box strong { font-weight: 700; }
  .toast { position: fixed; bottom: 2rem; left: 50%; transform: translateX(-50%) translateY(60px); background: #1a1a1a; color: #fff; padding: 10px 20px; border-radius: 20px; font-size: 13px; transition: transform 0.2s; pointer-events: none; z-index: 999; }
  .toast.show { transform: translateX(-50%) translateY(0); }
  .spinner { display: inline-block; width: 14px; height: 14px; border: 2px solid rgba(255,255,255,0.4); border-top-color: #fff; border-radius: 50%; animation: spin 0.7s linear infinite; margin-right: 6px; vertical-align: middle; }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<h1>👗 はるか着せ替えツール</h1>

<div class="section">
  <div class="section-label">写真をアップ</div>
  <div class="upload-area" id="upload-area" onclick="document.getElementById('file-input').click()">
    <div style="font-size:28px;">📷</div>
    <p>タップして写真を選ぶ</p>
  </div>
  <input type="file" id="file-input" accept="image/*" style="display:none">
  <img id="preview" alt="プレビュー">
</div>

<div class="section">
  <div class="section-label">何を変える？（複数OK）</div>
  <div class="chips">
    <button class="chip" data-cat="target" data-val="outfit">服・コーデ</button>
    <button class="chip" data-cat="target" data-val="makeup">メイク</button>
    <button class="chip" data-cat="target" data-val="hair">髪型</button>
    <button class="chip" data-cat="target" data-val="all">全部</button>
  </div>
</div>

<div class="section">
  <div class="section-label">スタイル</div>
  <div class="chips">
    <button class="chip" data-cat="style" data-val="casual streetwear">カジュアル</button>
    <button class="chip" data-cat="style" data-val="chic feminine fashion">フェミニン</button>
    <button class="chip" data-cat="style" data-val="smart office outfit">オフィス</button>
    <button class="chip" data-cat="style" data-val="sporty athletic wear">スポーツ</button>
    <button class="chip" data-cat="style" data-val="vintage retro style">ヴィンテージ</button>
    <button class="chip" data-cat="style" data-val="minimal clean look">ミニマル</button>
    <button class="chip" data-cat="style" data-val="Korean street fashion">韓国風</button>
  </div>
</div>

<div class="btn-row">
  <button class="btn primary" id="analyze-btn" onclick="analyzeImage()" disabled>
    AIで解析してプロンプト生成
  </button>
</div>

<div class="analysis-box" id="analysis-box">
  <div class="analysis-label">AIの解析結果</div>
  <p id="analysis-text"></p>
</div>

<div class="prompt-box" id="prompt-box" style="display:none;">
  <div class="prompt-label">生成プロンプト</div>
  <div class="prompt-text" id="prompt-display"></div>
  <div class="neg-label">ネガティブプロンプト</div>
  <div class="negative-text" id="negative-display">blurry, low quality, deformed, ugly, bad anatomy, watermark, text</div>
</div>

<div class="guide-box" id="guide-box">
  <p>
    ✅ <strong>プロンプトをコピーしました！</strong><br><br>
    次のステップ👇<br>
    1. 下の「SeaArtで生成」ボタンをタップ<br>
    2. SeaArtが開いたら「img2img」を選ぶ<br>
    3. 写真をアップしてプロンプトを貼り付け<br>
    4. 生成ボタンを押す🎉
  </p>
</div>

<div class="btn-row" id="action-btns" style="display:none;">
  <button class="btn" onclick="copyPrompt()">プロンプトをコピー</button>
  <button class="btn success" onclick="openSeaArt()">SeaArtで生成 →</button>
</div>

<div class="toast" id="toast"></div>

<script>
const GEMINI_API_KEY = 'AIzaSyDdxxN0XHmltqmhLXqEpv2PVSzIfqnRO5U';

let imageBase64 = null;
let imageType = null;
const state = { targets: new Set(), style: null };

document.getElementById('file-input').addEventListener('change', e => {
  const file = e.target.files[0];
  if (!file) return;
  imageType = file.type;
  const reader = new FileReader();
  reader.onload = ev => {
    imageBase64 = ev.target.result.split(',')[1];
    const preview = document.getElementById('preview');
    preview.src = ev.target.result;
    preview.style.display = 'block';
    document.getElementById('upload-area').classList.add('has-image');
    document.querySelector('#upload-area p').textContent = '画像を変更するにはタップ';
    checkReady();
  };
  reader.readAsDataURL(file);
});

document.querySelectorAll('[data-cat="target"]').forEach(chip => {
  chip.addEventListener('click', () => {
    const val = chip.dataset.val;
    if (val === 'all') {
      state.targets.clear();
      document.querySelectorAll('[data-cat="target"]').forEach(c => c.classList.remove('selected'));
      if (!state.targets.has('all')) { state.targets.add('all'); chip.classList.add('selected'); }
    } else {
      document.querySelector('[data-val="all"]').classList.remove('selected');
      state.targets.delete('all');
      if (state.targets.has(val)) { state.targets.delete(val); chip.classList.remove('selected'); }
      else { state.targets.add(val); chip.classList.add('selected'); }
    }
    checkReady();
  });
});

document.querySelectorAll('[data-cat="style"]').forEach(chip => {
  chip.addEventListener('click', () => {
    document.querySelectorAll('[data-cat="style"]').forEach(c => c.classList.remove('selected'));
    if (state.style === chip.dataset.val) { state.style = null; }
    else { state.style = chip.dataset.val; chip.classList.add('selected'); }
  });
});

function checkReady() {
  document.getElementById('analyze-btn').disabled = !(imageBase64 && state.targets.size > 0);
}

async function analyzeImage() {
  const btn = document.getElementById('analyze-btn');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>AIが解析中...';

  const targets = [...state.targets].join('、');
  const styleHint = state.style ? `変換スタイル: ${state.style}` : '';

  const prompt = `この画像を解析して、Stable Diffusion img2img用のプロンプトをJSON形式のみで返してください。マークダウン不要。

変換したい部分: ${targets}
${styleHint}

返答形式（JSONのみ）:
{
  "analysis": "画像の現状説明（日本語、1-2文）",
  "prompt": "img2img用英語プロンプト（変換内容を反映、カンマ区切り、詳細に）",
  "negative": "ネガティブプロンプト（英語）"
}`;

  try {
    const response = await fetch(
      `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${GEMINI_API_KEY}`,
      {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          contents: [{
            parts: [
              { inline_data: { mime_type: imageType, data: imageBase64 } },
              { text: prompt }
            ]
          }],
          generationConfig: { temperature: 0.4, maxOutputTokens: 1000 }
        })
      }
    );

    const data = await response.json();
    if (data.error) throw new Error(data.error.message);

let raw = data.candidates[0].content.parts[0].text;
console.log('Gemini raw response:', raw);
raw = raw.replace(/```json/g, '').replace(/```/g, '').trim();
const jsonMatch = raw.match(/\{[\s\S]*\}/);
if (!jsonMatch) throw new Error('JSONが見つかりません: ' + raw.substring(0, 100));
const result = JSON.parse(jsonMatch[0]);

    document.getElementById('analysis-box').style.display = 'block';
    document.getElementById('analysis-text').textContent = result.analysis;

    document.getElementById('prompt-box').style.display = 'block';
    document.getElementById('prompt-display').textContent = result.prompt;
    document.getElementById('negative-display').textContent = result.negative;

    // 自動でコピー＆ガイド表示
    await navigator.clipboard.writeText(result.prompt).catch(() => {
      const ta = document.createElement('textarea');
      ta.value = result.prompt;
      document.body.appendChild(ta); ta.select();
      document.execCommand('copy'); document.body.removeChild(ta);
    });

    document.getElementById('guide-box').style.display = 'block';
    document.getElementById('action-btns').style.display = 'flex';
    showToast('プロンプトを自動コピーしました！');

  } catch (err) {
    showToast('エラー: ' + err.message);
    console.error(err);
  } finally {
    btn.disabled = false;
    btn.innerHTML = 'AIで解析してプロンプト生成';
    checkReady();
  }
}

function copyPrompt() {
  const text = document.getElementById('prompt-display').textContent;
  navigator.clipboard.writeText(text).catch(() => {
    const ta = document.createElement('textarea');
    ta.value = text; document.body.appendChild(ta); ta.select();
    document.execCommand('copy'); document.body.removeChild(ta);
  });
  showToast('コピーしました！');
}

function openSeaArt() {
  copyPrompt();
  window.open('https://www.seaart.ai/tools/img2img', '_blank');
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}
</script>
</body>
</html>
